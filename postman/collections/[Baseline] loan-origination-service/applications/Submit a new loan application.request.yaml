type: http
name: Submit a new loan application
url: '{{baseUrl}}/applications'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "applicantId": "app_9876543210",
      "productType": "personal_loan",
      "requestedAmount": 25000,
      "termMonths": 36,
      "purpose": "debt_consolidation",
      "annualIncome": 85000,
      "employmentStatus": "full_time"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "id": "string",
            "applicantId": "string",
            "productType": "string",
            "requestedAmount": 1375.325011789401,
            "termMonths": 1119,
            "status": "withdrawn",
            "createdAt": "2022-06-11T02:39:57.724Z",
            "updatedAt": "1989-06-13T21:07:44.534Z",
            "underwritingResult": {
              "applicationId": "string",
              "status": "in_progress",
              "decision": "denied",
              "riskScore": 5,
              "evaluatedAt": "1983-02-10T15:33:26.062Z"
            }
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Application created successfully
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": {}
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invalid application data
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": {}
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Duplicate active application exists
